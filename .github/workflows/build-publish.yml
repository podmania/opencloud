name: Build & Publish

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild current version'
        required: false
        default: false
        type: boolean

jobs:
  build:
    uses: podmania/actions/.github/workflows/build-publish.yml@main
    with:
      package: opencloud
      version-output: opencloudVersion
      images: '[{"name":"opencloud","package":"opencloud-image"}]'
      force_rebuild: ${{ github.event.inputs.force_rebuild == 'true' }}
