services:
  sonarr:
    image: ghcr.io/podmania/opencloud:latest
    # set to host user id and gid
    # defaults to 1000:1000
    # user: 1001:1001
    container_name: opencloud
    ports:
      - 9200:9200
    volumes:   
      - ./config:/config
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro # optional: use either TZ variable or localtime mapping, not both
    # environment:
    #   - TZ=America/New_York
    restart: unless-stopped
